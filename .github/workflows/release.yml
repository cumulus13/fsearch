name: Release & Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Verify version tag matches Cargo.toml ─────────────────────────────────────
  verify-version:
    name: ✅ Verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag version   : $TAG"
          echo "Cargo version : $CARGO_VERSION"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "❌ Version mismatch! Tag=$TAG, Cargo.toml=$CARGO_VERSION"
            exit 1
          fi
          echo "✅ Versions match: $TAG"

  # ── Build release binaries for all platforms ──────────────────────────────────
  build-release:
    name: 📦 Build ${{ matrix.asset_name }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: fsearch-linux-x86_64
            archive_ext: .tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: fsearch-linux-aarch64
            archive_ext: .tar.gz
            cross: true

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: fsearch-linux-x86_64-musl
            archive_ext: .tar.gz
            musl: true

          # ── macOS ────────────────────────────────────────────────────────────
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: fsearch-macos-x86_64
            archive_ext: .tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: fsearch-macos-aarch64
            archive_ext: .tar.gz

          # ── Windows ──────────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: fsearch-windows-x86_64
            archive_ext: .zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package (Unix) ────────────────────────────────────────────────────────
      - name: Package tar.gz (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/fsearch dist/fsearch
          cp README.md LICENSE fsearch.toml.example dist/
          chmod +x dist/fsearch
          cd dist
          tar czf ../${{ matrix.asset_name }}.tar.gz .
          cd ..
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      # ── Package (Windows) ─────────────────────────────────────────────────────
      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "target\${{ matrix.target }}\release\fsearch.exe" dist\fsearch.exe
          Copy-Item README.md, LICENSE, fsearch.toml.example dist\
          Compress-Archive -Path dist\* -DestinationPath "${{ matrix.asset_name }}.zip"
          $hash = (Get-FileHash "${{ matrix.asset_name }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset_name }}.zip" | Out-File "${{ matrix.asset_name }}.zip.sha256" -Encoding ASCII

      - name: Upload release artefact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}${{ matrix.archive_ext }}
            ${{ matrix.asset_name }}${{ matrix.archive_ext }}.sha256

  # ── Create GitHub Release ──────────────────────────────────────────────────────
  github-release:
    name: 🚀 GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: release-artefacts
          pattern: release-*
          merge-multiple: true

      - name: List artefacts
        run: ls -lh release-artefacts/

      - name: Set tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "⚡ fsearch ${{ steps.tag.outputs.tag }}"
          body: |
            ## ⚡ fsearch ${{ steps.tag.outputs.tag }}

            ### 📦 Downloads

            | Platform | Archive |
            |----------|---------|
            | Linux x86_64 (glibc) | `fsearch-linux-x86_64.tar.gz` |
            | Linux aarch64 (glibc) | `fsearch-linux-aarch64.tar.gz` |
            | Linux x86_64 (musl / static) | `fsearch-linux-x86_64-musl.tar.gz` |
            | macOS x86_64 | `fsearch-macos-x86_64.tar.gz` |
            | macOS Apple Silicon | `fsearch-macos-aarch64.tar.gz` |
            | Windows x86_64 | `fsearch-windows-x86_64.zip` |

            SHA-256 checksums are provided alongside each archive.

            ### 🚀 Quick install (Linux/macOS)
            ```bash
            tar xzf fsearch-linux-x86_64.tar.gz
            sudo mv fsearch /usr/local/bin/
            fsearch --version
            ```

            ### 🚀 Quick install (Windows PowerShell)
            ```powershell
            Expand-Archive fsearch-windows-x86_64.zip .
            .\fsearch.exe --version
            ```

            ### 📦 Via cargo
            ```bash
            cargo install fast-search
            ```
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          files: release-artefacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io ───────────────────────────────────────────────────────
  publish-crates:
    name: 📤 Publish to crates.io
    needs: github-release
    runs-on: ubuntu-latest
    # Optional: requires manual approval in GitHub → Settings → Environments → crates-io
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: publish-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Dry-run publish check
        run: cargo publish --dry-run

      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
